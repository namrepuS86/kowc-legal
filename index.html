
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kowċ Legal</title>
<style>
:root{
--accent:#d32f2f;
--accent-soft:#ff4d4d;
--dark-bg:#0b0b0b;
--dark-card:#1a1a1a;
--dark-border:#2a2a2a;
--dark-text:#f5f5f5;
--light-bg:#f3f3f3;
--light-card:#ffffff;
--light-border:#e3e3e3;
--light-text:#111111;
font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
}

body{
margin:0;
background:var(--dark-bg);
color:var(--dark-text);
}

.container{
max-width:950px;
margin:auto;
padding:40px 20px 60px;
}

header{
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:30px;
}

.logo{
height:46px;
}

nav a{
color:var(--dark-text);
text-decoration:none;
margin-left:20px;
font-weight:600;
opacity:.85;
}

nav a:hover{
color:var(--accent-soft);
}

.card{
background:var(--dark-card);
border:1px solid var(--dark-border);
border-radius:18px;
padding:28px;
margin-top:20px;
}

h1{font-size:34px;margin:0 0 10px;}
h2{margin-top:30px;}
p{line-height:1.6}
ul{padding-left:20px}

.footer{
margin-top:60px;
font-size:14px;
opacity:.7;
}

.accent-bar{
height:6px;
width:60px;
background:var(--accent);
border-radius:3px;
margin-bottom:18px;
}

/* Light mode */
@media (prefers-color-scheme: light){

body{
background:var(--light-bg);
color:var(--light-text);
}

nav a{color:var(--light-text);}

.card{
background:var(--light-card);
border:1px solid var(--light-border);
}

}
</style>
</head>
<body>
<div class="container">

<header>
<div>
<img src="assets/logo.png" class="logo">
</div>
<nav>
<a href="index.html">Home</a>
<a href="privacy.html">Privacy</a>
<a href="terms.html">Terms</a>
<a href="cookies.html">Cookies</a>
</nav>
</header>

<div class="card">
<div class="accent-bar"></div>
<h1>Legal Information</h1>
<p>This page contains the official legal documents for the Kowċ football coaching application.</p>
<ul>
<li><a href="privacy.html">Privacy Policy</a></li>
<li><a href="terms.html">Terms of Service</a></li>
<li><a href="cookies.html">Cookie Policy</a></li>
</ul>
</div>

<div class="footer">
<p>Kowċ • Claude Carbonaro • Malta</p>
<p>Contact: kowc.app@gmail.com</p>
</div>

</div>
</body>
</html>
